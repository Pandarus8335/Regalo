<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Feliz cumpleaños</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #072896, #120b30);
    text-align: center;
    color: white;
}

.container {
    padding: 20px;
}

h1 {
    font-size: 1.8em;
}

.card {
    background: rgba(255,255,255,0.1);
    backdrop-filter: blur(10px);
    border-radius: 20px;
    padding: 20px;
    margin: 20px auto;
    max-width: 400px;
}

.carousel {
    position: relative;
    width: 100%;
    overflow: hidden;
    border-radius: 15px;
}

.carousel img {
    width: 100%;
    display: none;
    border-radius: 15px;
}

.carousel img.active {
    display: block;
}

button {
    margin: 10px;
    padding: 10px 15px;
    border: none;
    border-radius: 20px;
    background: #ff5e78;
    color: white;
    cursor: pointer;
}
</style>
</head>

<body>

<div class="container">
    <h1>
        Tenía planeado esto desde antes, pero por las circunstancias no se pudo...  
        aun así quería que lo tuvieras ❤️
    </h1>

    <!-- PRIMER CARRUSEL -->
    <div class="card">
        <h2>Nosotros 📸</h2>

        <div class="carousel" id="c1">
            <img src="f1.jpeg" class="active">
            <img src="f2.jpeg">
            <img src="f3.jpeg">
            <img src="f4.jpeg">
            <img src="f5.jpeg">
        </div>

        <button onclick="prev('c1')">⬅</button>
        <button onclick="next('c1')">➡</button>
    </div>

    <!-- SEGUNDO CARRUSEL (CARTAS) -->
    <div class="card">
        <h2>Algo que ya no te pude dar 💔</h2>

        <p>
            Estas son cartas que escribí para ti…  
            cosas que quería decirte, pero ya no tuve la oportunidad.  
            Aun así, fueron reales.
        </p>

        <div class="carousel" id="c2">
            <img src="f6.jpeg" class="active">
            <img src="f7.jpeg">
            <img src="f8.jpeg">
            <img src="f9.jpeg">
            <img src="f10.jpeg">
            <img src="f11.jpeg">
            <img src="f12.jpeg">
            <img src="f13.jpeg">
            <img src="f14.jpeg">
            <img src="f15.jpeg">
        </div>

        <button onclick="prev('c2')">⬅</button>
        <button onclick="next('c2')">➡</button>
    </div>

</div>

<script>
const carousels = {};

function initCarousel(id) {
    const images = document.querySelectorAll(`#${id} img`);
    carousels[id] = { index: 0, images: images };
}

function showImage(id, i) {
    const c = carousels[id];
    c.images.forEach(img => img.classList.remove("active"));
    c.images[i].classList.add("active");
}

function next(id) {
    const c = carousels[id];
    c.index = (c.index + 1) % c.images.length;
    showImage(id, c.index);
}

function prev(id) {
    const c = carousels[id];
    c.index = (c.index - 1 + c.images.length) % c.images.length;
    showImage(id, c.index);
}

window.onload = function() {
    initCarousel("c1");
    initCarousel("c2");
};
</script>

</body>
</html>
